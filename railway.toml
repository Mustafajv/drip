[build]
builder = "NIXPACKS"
buildCommand = "bun install && bunx prisma generate && bun run build"
[phases.setup]
nixPkgs = ["nodejs_22"]

[deploy]
startCommand = "bun server/index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
